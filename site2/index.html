
<DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航模板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: #000;
            color: #fff;
            padding: 16px;
            max-width: 430px;
            margin: 0 auto;
        }
        .banner {
            background: linear-gradient(135deg, #6a5acd 0%, #ff69b4 100%);
            border-radius: 20px;
            padding: 32px 20px;
            text-align: center;
            margin-bottom: 16px;
        }
        .banner .domain {
            font-size: 3.2rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 24px;
        }
        .banner .btn {
            background-color: rgba(0,0,0,0.25);
            border-radius: 16px;
            padding: 20px;
            font-size: 1.6rem;
            color: #fff;
            display: block;
            width: 100%;
            border: none;
        }
        .card {
            background-color: #eee;
            color: #000;
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 16px;
        }
        .card .title {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .card .title .icon {
            width: 20px;
            height: 20px;
            margin-right: 6px;
        }
        .card .text-block {
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 6px;
        }
        .red-text {
            color: red;
            font-weight: bold;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 14px;
        }
        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
        }
        .grid-item .icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            margin-bottom: 6px;
            object-fit: cover;
        }
        .grid-item .name {
            font-size: 0.8rem;
            color: #000;
            line-height: 1.2;
            white-space: nowrap;
        }
        .simu-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 14px;
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="domain">PG777.LOL</div>
        <button class="btn">2026世界杯<br>点击查看赛程</button>
    </div>

    <div class="card">
        <div class="title">
            <span class="icon">🔥</span>
            十年信誉平台
        </div>
        <div class="text-block">
            模拟器你们可以去抖音评论区换水
        </div>
        <div class="red-text">
            冲够600找站长旺旺414856912达标返388
        </div>
        <div class="text-block">
            打不开台子切换成WiFi刷新几下
        </div>

        <div class="title" style="margin-top: 16px;">
            <span class="icon">⚽</span>
            世界杯官方投注平台
        </div>
        <div class="grid">
            <a class="grid-item" href="https://lncqc.jgqvji.com/app/register.php?site_id=1050&topId=8501769272993287&selfPlanId=4678519" target="_blank">
                <img class="icon" src="https://s3.bmp.ovh/2026/04/19/JfyWQ89B.png">
                <div class="name">非凡娱乐</div>
            </a>
            <a class="grid-item" href="https://cv16f.top" target="_blank">
                <img class="icon" src="https://s3.bmp.ovh/2026/04/21/SSBc4wXq.png">
                <div class="name">超凡国际</div>
            </a>
            <a class="grid-item" href="https://izcvoj.hfjcl.com/app/register.php?site_id=1021&topId=3991774367380774" target="_blank">
                <img class="icon" src="https://s3.bmp.ovh/2026/04/21/TIXRXrZO.png">
                <div class="name">多多28</div>
            </a>
            <a class="grid-item" href="https://wdtb65.top" target="_blank">
                <img class="icon" src="https://s3.bmp.ovh/2026/04/19/8CNWxVEA.png">
                <div class="name">问鼎娱乐</div>
            </a>
            <a class="grid-item" href="https://hd99g.top" target="_blank">
                <img class="icon" src="https://s3.bmp.ovh/2026/04/21/PnQbMXLf.png">
                <div class="name">汇赢国际</div>
            </a>
        </div>
    </div>

    <div class="card">
        <div class="title">
            <span class="icon">🔥</span>
            PG模拟器大全
        </div>
        <div class="simu-grid">
            <div class="grid-item">
                <img class="icon" src="https://s3.bmp.ovh/2026/04/21/0BwiklNe.png">
                <div class="name">PG模拟器</div>
            </div>
            <div class="grid-item">
                <img class="icon" src="https://s3.bmp.ovh/2026/04/21/cWLwdQq2.png">
                <div class="name">PP模拟器</div>
            </div>
        </div>
    </div>
</body>
</html>
